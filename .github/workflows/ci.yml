# name of workflow
name: CI
# we want this workflow to run every time we push to the main
on:
  push:
    branches:
        - main
#to trigger on pull requests also
  pull_request:
    branches:
        - main
# we want to trigger it manually in the UI.
  workflow_dispatch:
# we will make first job a unit test job
jobs:
  unit-tests-backend:
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.test-backend.outputs.report }}

    steps:
     # First job action to checkout the code
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"
          #after the branch is cloned it makes next runs much quicker
          cache-dependency-path: bugtracker-backend/go.sum

      - name: Install go-junit-report
        # we will need to install go-junit dependency
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      # The name that will appear in the UI
      - name: Execute Backend Unit Tests 
      # we adding id for the output needed to be tracked
        id: test-backend
      # Specify the working directory that we want unit test to run
        working-directory: ./bugtracker-backend
      # Specify the shell commands that we want to run, we want to run all go tests.
      # For first run will fail as after defined that it runs on ubuntu-latest,
      # So we will have to install go before using it.
      # What we done before either to install go before run UT or using docker image that will install go tool.
      # But in github we can use special actions that have beeen predefined and will install go quickly on our github.
      # we are using cat which printing every thing in the coverage txt file to the UI
      ##  echo"report<<EOF" $GITHUB_OUTPUT This initializes a multi-line output variable named report. The <<EOF tells GitHub Actions, "Hey, everything after this is part of the report value, until you see the word EOF again."

        run: |
          go test -json -coverprofile coverage.out -covermode=atomic ./...     
          go tool cover -func coverage.out > coverage.txt
          echo "## Go Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat coverage.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go test -v ./... 2>&1 | go-junit-report > test-results.xml

          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat coverage.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT


      - name: Publish Backend Test Results
        # to use pre-built, community-made action called test-reporter created by the user dorny
        uses: dorny/test-reporter@v1
        # to make sure that the test runs even it fails
        if: always()
        with:
          name: Backend Unit Tests Report
          path: bugtracker-backend/test-results.xml
          # Tells this action to expect a JUnit XML format, which is the specific structure jest-junit uses to log test results.
          reporter: jest-junit



  unit-tests-frontend:
    # it means i want to make backend to run first as they are runing sequential
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.test-frontend.outputs.report }}
    steps:
      - uses: actions/checkout@v4
      - name: set up Node.jobs
        # its a github action used to setup the node for us its made by someone else
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
           #after the branch is cloned it makes next runs much quicker
          cache-dependency-path: bugtracker-frontend/package-lock.json



      - name: Execute Frontend Unit Tests
        id: test-frontend
        working-directory: ./bugtracker-frontend
        run: |
          npm ci
          npm test |tee full_output.txt

         
          echo "## Frontend Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat full_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat full_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish Frontend Test Results
        # to use pre-built, community-made action called test-reporter created by the user dorny
        uses: dorny/test-reporter@v1
        # to make sure that the test runs even it fails
        if: always()
        with:
          name: Frontend Unit Tests Report
          path: bugtracker-frontend/test-results.xml
          # Tells this action to expect a JUnit XML format, which is the specific structure jest-junit uses to log test results.
          reporter: jest-junit

  create-coverage-comment:
      # to trun wehn there is a pull request triggered
      if: github.event_name == 'pull_request'
      # we will make first this to the backend tests
      needs: [unit-tests-backend, unit-tests-frontend]
      runs-on: ubuntu-latest
      # we want this job to make comments so we have to give her permissions like 
      permissions:
        pull-requests: write
      steps:
        - name: Create Backend Coverage comment
          # we can take actions that exist in marketplace or anywhere else then bring them to your project
          uses: peter-evans/create-or-update-comment@v4
          with:
            # pull request number
            issue-number: ${{ github.event.pull_request.number }}
            # we will need here to add the actual body of the comment itself
            ## we will pull this data out of outputs.coverage job
             ## Backend Test Coverage Report, it takes output from another job
            body: |
              ## Backend Test Coverage Report
              ```
              ${{ needs.unit-tests-backend.outputs.coverage }}
              ```
        - name: Create Frontend Coverage comment
          # we can take actions that exist in marketplace or anywhere else then bring them to your project
          uses: peter-evans/create-or-update-comment@v4
          with:
            # pull request number
            issue-number: ${{ github.event.pull_request.number }}
            # we will need here to add the actual body of the comment itself
            ## we will pull this data out of outputs.coverage job
            ## Frontend Test Coverage Report, it takes output from another job
            body: |
              ## Frontend Test Coverage Report
              ```
              ${{ needs.unit-tests-frontend.outputs.coverage }}
              ```
  api-tests:
    needs: [unit-tests-backend, unit-tests-frontend]
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Launch Application
        run: |
          docker compose up --build -d
          npx wait-port http://localhost:8080/api/health -t 30000

      - name: Run API Tests
        working-directory: ./tests-api
        run: |
          npm ci
          npm playwright test